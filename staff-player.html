<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Staff Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;touch-action:none;background:#fff;color:#1a1a1a;
user-select:none;-webkit-user-select:none;font-family:-apple-system,system-ui,sans-serif}
body{padding:0}

.settings-btn{
  position:fixed;top:env(safe-area-inset-top,0);left:0;z-index:101;
  border-radius:50%;
  background:transparent;color:#ddd;border:none;font-weight:600;
  font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.settings-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(255,255,255,0.97);
  display:none;flex-direction:column;padding:20px;padding-top:calc(env(safe-area-inset-top,0) + 20px);
  overflow-y:auto;
}
.settings-overlay.open{display:flex}
.settings-section{margin-bottom:24px}
.settings-label{font-size:13px;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.key-bar{display:flex;align-items:stretch;border:1px solid #ccc;border-radius:8px;overflow:hidden}
.key-btn{
  flex:1;border:none;border-right:1px solid #ccc;background:transparent;color:#1a1a1a;
  font-size:15px;padding:8px 0;text-align:center;cursor:pointer;transition:all 0.15s;
  font-family:inherit;line-height:1;
}
.key-btn:last-child{border-right:none}
.key-btn.active{background:#d74002;color:#fff}
.key-btn.in-range{background:#d74002;color:#fff}
.key-btn:active{background:#e8e8e8}
.mode-bar{display:flex;gap:8px}
.mode-opt{
  flex:1;border:1px solid #ccc;border-radius:8px;background:transparent;color:#1a1a1a;
  font-size:14px;padding:10px 0;text-align:center;cursor:pointer;font-family:inherit;
}
.mode-opt.active{background:#d74002;color:#fff;border-color:#d74002}
.mode-opt:active{background:#e8e8e8}
.settings-close{
  align-self:flex-end;border:none;background:transparent;font-size:28px;color:#999;
  cursor:pointer;padding:0 4px;margin-bottom:12px;font-family:inherit;
}

canvas{width:100%;height:100%;display:block}
</style>
</head>
<body>

<canvas id="c"></canvas>
<button class="settings-btn" id="settingsBtn">♮</button>
<div class="settings-overlay" id="settingsOverlay">
  <button class="settings-close" id="settingsClose">✕</button>
  <div class="settings-section">
    <div class="settings-label">Key Signature</div>
    <div class="key-bar" id="keyBar"></div>
  </div>
  <div class="settings-section">
    <div class="settings-label">Staves</div>
    <div class="mode-bar">
      <button class="mode-opt active" data-mode="both">𝄞 + 𝄢</button>
      <button class="mode-opt" data-mode="treble">𝄞 only</button>
      <button class="mode-opt" data-mode="bass">𝄢 only</button>
    </div>
  </div>
</div>
<div id="startOverlay" style="position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);
display:flex;align-items:center;justify-content:center;cursor:pointer">
<span style="color:#fff;font-size:22px;font-weight:600;font-family:inherit;
text-shadow:0 1px 4px rgba(0,0,0,0.5)">Tap to start</span>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// MUSIC THEORY
// ═══════════════════════════════════════════════════════════

// Staff positions: 0 = middle C (C4).
// +1 = D4, +2 = E4, ... +7 = C5.  -1 = B3, -2 = A3, etc.
// Lines are at even positions in each staff region.
// Treble staff lines (bottom to top): E4=2, G4=4, B4=6, D5=8, F5=10
// Bass staff lines (top to bottom): A3=-2, F3=-4, D3=-6, B2=-8, G2=-10

const SHARP_ORDER = [3, 0, 4, 1, 5, 2, 6]; // scale degrees: F C G D A E B
const FLAT_ORDER  = [6, 2, 5, 1, 4, 0, 3]; // B E A D G C F

const DIATONIC_SEMI = [0, 2, 4, 5, 7, 9, 11]; // C D E F G A B

const KEY_SIGS = [
  {l:'7♭',v:-7},{l:'6♭',v:-6},{l:'5♭',v:-5},{l:'4♭',v:-4},
  {l:'3♭',v:-3},{l:'2♭',v:-2},{l:'1♭',v:-1},{l:'—',v:0},
  {l:'1♯',v:1},{l:'2♯',v:2},{l:'3♯',v:3},{l:'4♯',v:4},
  {l:'5♯',v:5},{l:'6♯',v:6},{l:'7♯',v:7},
];

let keySig = parseInt(localStorage.getItem('keySig')) || 0;
let staffMode = localStorage.getItem('staffMode') || 'both';

function getAlteredDegrees(ks) {
  const m = new Map();
  if (ks > 0) for (let i = 0; i < ks; i++) m.set(SHARP_ORDER[i], 1);
  else if (ks < 0) for (let i = 0; i < -ks; i++) m.set(FLAT_ORDER[i], -1);
  return m;
}

function staffPosToMidi(sp, alteration) {
  const deg = ((sp % 7) + 7) % 7;
  const oct = 4 + Math.floor(sp / 7);
  const alt = getAlteredDegrees(keySig);
  const ksAdj = alt.has(deg) ? alt.get(deg) : 0;
  return 60 + (oct - 4) * 12 + DIATONIC_SEMI[deg] + ksAdj + alteration;
}

function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

// ═══════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════

let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({latencyHint: 'playback'});
    // Keep a silent oscillator running on the main output to keep the
    // audio hardware pipeline warm (avoids pop on first real note)
    const warmup = audioCtx.createOscillator();
    const muteGain = audioCtx.createGain();
    muteGain.gain.value = 0;
    warmup.connect(muteGain);
    muteGain.connect(audioCtx.destination);
    warmup.start();
    // iOS Safari: also feed silence through an <audio> element to switch
    // the audio session to "playback" category (ignores hardware silent switch)
    if (/iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) {
      try {
        const streamDest = audioCtx.createMediaStreamDestination();
        muteGain.connect(streamDest);
        const audio = new Audio();
        audio.srcObject = streamDest.stream;
        audio.play();
      } catch (e) {}
    }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// Equal-loudness compensation (simplified ISO 226)
// Attempt to make all notes sound equally loud perceptually.
// Boosts low frequencies, attenuates highs, referenced to ~500 Hz.
function loudnessGain(freq) {
  // Attempt to approximate the inverse of the equal-loudness contour.
  // Below ~500 Hz: boost progressively (low freqs need more amplitude).
  // Above ~2 kHz: slight attenuation (ear is very sensitive there).
  // Reference level at 500 Hz = 1.0
  const ref = 500;
  if (freq < ref) {
    // ~12 dB per octave below 500 Hz (very aggressive boost for lows)
    return Math.pow(ref / freq, 1.1);
  } else {
    // Gentle rolloff above reference
    return Math.pow(ref / freq, 0.2);
  }
}

const FADE = 0.02; // crossfade duration for frequency changes

function makeOsc(freq) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  return { osc, gain };
}

class NoteSound {
  constructor(freq) {
    ensureAudio();
    // Schedule slightly ahead to ensure the audio graph is compiled
    // before the ramp starts (avoids percussive first-note on some browsers)
    const now = audioCtx.currentTime + 0.005;
    const { osc, gain } = makeOsc(freq);
    this.osc = osc;
    this.gain = gain;
    this.freq = freq;
    const vol = 0.45 * loudnessGain(freq);
    const attack = Math.max(0.015, 4 / freq);
    gain.gain.setValueAtTime(0, now);
    gain.gain.setTargetAtTime(vol, now, attack / 3);
    osc.start(now);
    this.alive = true;
  }
  _retire(osc, gain, freq) {
    const now = audioCtx.currentTime;
    // Release needs enough cycles to avoid cutting mid-waveform on low notes
    const release = Math.max(FADE, 4 / freq) / 3;
    gain.gain.cancelScheduledValues(now);
    gain.gain.setTargetAtTime(0, now, release);
    osc.stop(now + release * 15);
    osc.onended = () => { try { gain.disconnect(); } catch(e) {} };
  }
  setFreq(f) {
    if (!this.alive) return;
    const vol = 0.45 * loudnessGain(f);
    // Retire old oscillator
    this._retire(this.osc, this.gain, this.freq);
    // Fade in new oscillator at the new frequency
    const now = audioCtx.currentTime;
    const { osc, gain } = makeOsc(f);
    gain.gain.setValueAtTime(0, now);
    gain.gain.setTargetAtTime(vol, now, FADE / 3);
    osc.start(now);
    this.osc = osc;
    this.gain = gain;
    this.freq = f;
  }
  release() {
    if (!this.alive) return;
    this.alive = false;
    this._retire(this.osc, this.gain, this.freq);
  }
}

// ═══════════════════════════════════════════════════════════
// LAYOUT
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let LINE_SP;      // distance between adjacent staff lines
let TREBLE_TOP;   // y of top line of treble staff
let BASS_TOP;     // y of top line of bass staff
let BASS_SHIFT;   // extra Y offset for bass staff (gap between systems)
let STAFF_LEFT = 0;
let STAFF_RIGHT;
let CLEF_W;
let staffLW;
const TOP_RESERVE = 0;

// Key sig accidental positions on staff
// Treble sharp pos (staffPos): F5=10, C5=7, G5=11, D5=8, A4=5, E5=9, B4=6
const T_SHARP = [10, 7, 11, 8, 5, 9, 6];
const T_FLAT  = [6, 9, 5, 8, 4, 7, 3];
// Bass: same visual positions as treble, mapped to bass staff positions
const B_SHARP = [-4, -7, -3, -6, -9, -5, -8];
const B_FLAT  = [-8, -5, -9, -6, -10, -7, -11];

function staffPosToY(sp, clef) {
  if (clef === 'bass' || staffMode === 'bass') {
    // Bass system: sp=-2 (A3) at BASS_TOP
    return BASS_TOP - (sp - (-2)) * (LINE_SP / 2);
  }
  // Treble system: sp=2 (E4) at TREBLE_TOP + 4*LINE_SP
  const trebleBottom = TREBLE_TOP + 4 * LINE_SP;
  return trebleBottom - (sp - 2) * (LINE_SP / 2);
}

function yToStaffInfo(y) {
  if (staffMode === 'treble') {
    const sp = Math.round(2 + (TREBLE_TOP + 4 * LINE_SP - y) / (LINE_SP / 2));
    return { sp, clef: 'treble' };
  }
  if (staffMode === 'bass') {
    const sp = Math.round(-2 - (y - BASS_TOP) / (LINE_SP / 2));
    return { sp, clef: 'bass' };
  }
  const mid = (TREBLE_TOP + 4 * LINE_SP + BASS_TOP) / 2;
  if (y <= mid) {
    const sp = Math.round(2 + (TREBLE_TOP + 4 * LINE_SP - y) / (LINE_SP / 2));
    return { sp, clef: 'treble' };
  } else {
    const sp = Math.round(-2 - (y - BASS_TOP) / (LINE_SP / 2));
    return { sp, clef: 'bass' };
  }
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const usableH = H - TOP_RESERVE;
  // both: 10 LS staves + 2 margin = 12; single: 4 LS staff + 2 LS ledger + 2 margin = 8
  const staffUnits = staffMode === 'both' ? 12 : 8;
  LINE_SP = usableH / staffUnits;

  if (staffMode === 'both') {
    const total = 10 * LINE_SP;
    const top = TOP_RESERVE + (usableH - total) / 2;
    TREBLE_TOP = top;
    BASS_SHIFT = 0;
    BASS_TOP = top + 6 * LINE_SP;
  } else if (staffMode === 'treble') {
    // Center 6 LS (4 staff + 2 ledger below)
    const total = 6 * LINE_SP;
    const top = TOP_RESERVE + (usableH - total) / 2;
    TREBLE_TOP = top;
    BASS_SHIFT = 0;
    BASS_TOP = 9999; // off-screen
  } else {
    // Center 6 LS (2 ledger above + 4 staff)
    const total = 6 * LINE_SP;
    const top = TOP_RESERVE + (usableH - total) / 2;
    BASS_TOP = top + 2 * LINE_SP;
    TREBLE_TOP = -9999; // off-screen
    BASS_SHIFT = 0;
  }

  STAFF_RIGHT = W;

  staffLW = Math.max(1.2, LINE_SP * 0.08);

  const btnSz = LINE_SP - staffLW / 2;
  const sb = document.getElementById('settingsBtn');
  sb.style.width = btnSz + 'px';
  sb.style.height = btnSz + 'px';
  sb.style.fontSize = (btnSz * 0.6) + 'px';
  CLEF_W = LINE_SP * 4;
}

// ═══════════════════════════════════════════════════════════
// DRAWING HELPERS
// ═══════════════════════════════════════════════════════════

// Bravura accidental outlines (SIL Open Font License 1.1)
const ACC_SHARP_O = 'm 341 170 b 359 194 351 174 359 186 l 359 297 b 348 308 359 304 354 308 b 341 307 346 308 344 308 b 305 294 341 307 312 295 b 285 312 295 294 285 301 l 285 488 b 265 504 285 497 276 504 b 242 488 251 504 242 497 l 242 301 b 223 259 240 287 236 268 b 132 223 206 249 157 229 b 115 252 120 223 115 240 l 115 425 b 95 441 115 433 105 441 b 72 425 81 441 72 433 l 72 230 b 55 192 72 210 63 196 b 17 176 46 187 17 176 b 0 153 7 173 0 161 l 0 50 b 13 37 0 42 4 37 l 16 39 b 50 53 17 39 39 48 l 52 55 b 72 29 63 55 72 40 l 72 -114 b 56 -147 72 -130 65 -143 b 17 -163 48 -150 17 -163 b 0 -186 7 -166 0 -177 l 0 -288 b 13 -301 0 -297 4 -301 l 16 -300 b 50 -287 17 -300 37 -291 b 55 -285 52 -285 53 -285 b 72 -308 65 -285 72 -301 l 72 -485 b 91 -501 72 -494 81 -501 b 115 -485 105 -501 115 -494 l 115 -285 b 130 -253 115 -266 122 -256 l 217 -217 b 219 -217 217 -217 219 -217 l 222 -216 b 242 -242 235 -216 242 -233 l 242 -422 b 261 -438 242 -431 251 -438 b 285 -422 276 -438 285 -431 l 285 -217 b 301 -184 285 -206 291 -189 b 341 -168 311 -180 341 -168 b 359 -144 351 -164 359 -153 l 359 -42 b 348 -30 359 -35 354 -30 b 341 -32 346 -30 344 -30 l 304 -46 b 285 -20 295 -46 285 -37 l 285 114 b 304 156 285 124 292 151 z m 242 -65 b 132 -122 233 -94 166 -122 b 115 -115 124 -122 117 -120 b 111 -43 112 -109 111 -78 b 115 63 111 1 112 52 b 220 118 118 88 184 118 b 242 109 230 118 239 115 b 248 27 245 102 248 66 b 242 -65 248 -12 245 -52 z';
const ACC_FLAT_O = 'm 17 -245 b 30 -252 22 -251 26 -252 b 39 -249 35 -252 39 -249 b 153 -161 82 -225 117 -186 b 325 82 281 -72 325 16 b 196 220 325 164 262 216 b 117 196 171 220 137 209 b 85 176 108 189 92 176 b 78 177 82 176 81 176 b 62 202 68 181 62 192 b 72 608 63 233 72 579 b 45 632 72 624 59 632 b 0 592 24 632 1 618 b 17 -245 0 592 6 -230 z m 68 -117 b 63 27 68 -117 63 -30 b 66 73 63 50 65 68 b 167 144 76 102 134 144 b 226 60 209 144 226 96 b 98 -134 226 -17 160 -95 b 84 -138 92 -137 88 -138 b 68 -117 71 -138 68 -124 z';
const ACC_NATURAL_O = 'm 203 261 b 197 259 200 261 199 259 b 68 226 197 259 105 226 b 53 233 59 226 53 228 l 53 474 b 36 491 53 484 45 491 l 17 491 b 0 474 7 491 0 484 l 0 -268 b 13 -281 0 -276 4 -281 l 16 -279 b 22 -278 17 -279 20 -279 b 164 -235 42 -269 122 -235 b 189 -251 179 -235 189 -239 l 189 -465 b 206 -482 189 -475 196 -482 l 225 -482 b 242 -465 233 -482 242 -475 l 242 258 b 230 269 242 265 236 269 b 225 268 229 269 226 269 z m 53 56 b 176 114 53 76 141 114 b 189 107 184 114 189 112 l 189 -42 b 71 -101 189 -68 107 -101 b 53 -92 60 -101 53 -98 z';

// Accidental metrics (for centering): sharp w=359 h=698, flat w=325 h=614, natural w=242 h=676
function drawSharpSym(cx, cy, sz, color) {
  const scale = sz / 350;
  ctx.fillStyle = color;
  renderOutline(ACC_SHARP_O, scale, cx - 180 * scale, cy);
}
function drawFlatSym(cx, cy, sz, color) {
  const scale = sz / 310;
  ctx.fillStyle = color;
  renderOutline(ACC_FLAT_O, scale, cx - 80 * scale, cy);
}
function drawNaturalSym(cx, cy, sz, color) {
  const scale = sz / 340;
  ctx.fillStyle = color;
  renderOutline(ACC_NATURAL_O, scale, cx - 120 * scale, cy);
}

// ═══════════════════════════════════════════════════════════
// CLEFS — Bravura font glyphs (SIL Open Font License 1.1)
// Source: Steinberg Bravura via VexFlow
// Rendered using VexFlow's outline format (absolute coords)
// ═══════════════════════════════════════════════════════════

const GCLEF_O = 'm 541 598 b 550 625 539 615 541 616 b 824 1174 706 770 824 953 b 730 1509 824 1299 789 1423 b 655 1581 708 1541 671 1581 b 562 1512 635 1581 590 1544 b 420 1064 455 1394 420 1214 b 441 828 420 981 431 887 b 428 793 444 811 445 808 b 0 125 220 622 0 416 b 524 -363 0 -125 171 -363 b 624 -354 557 -363 595 -360 b 645 -367 639 -351 642 -350 b 684 -657 662 -464 684 -589 b 455 -896 684 -870 540 -896 b 340 -854 377 -896 340 -873 b 386 -829 340 -844 353 -840 b 482 -694 431 -816 482 -778 b 344 -547 482 -615 432 -547 b 190 -713 248 -547 190 -624 b 464 -948 190 -806 246 -948 b 747 -660 560 -948 747 -904 b 706 -351 747 -577 721 -441 b 724 -327 703 -334 704 -336 b 966 16 870 -269 966 -147 b 619 363 966 200 831 363 b 577 389 582 363 582 363 z m 677 1358 b 763 1240 724 1358 763 1319 b 513 851 763 1080 626 950 b 494 863 503 842 497 844 b 485 995 488 900 485 949 b 677 1358 485 1220 589 1358 z m 520 377 b 498 343 524 350 524 351 b 289 63 372 300 289 186 b 455 -192 289 -66 357 -158 b 494 -200 467 -196 484 -200 b 511 -184 505 -200 511 -193 b 490 -166 511 -174 500 -170 b 386 -12 429 -140 386 -78 b 530 157 386 71 442 132 b 559 145 553 163 556 161 l 631 -284 b 611 -304 634 -300 632 -300 b 530 -311 588 -308 559 -311 b 115 29 278 -311 115 -171 b 249 363 115 114 130 228 b 469 567 336 459 402 513 b 490 562 484 579 487 577 z m 619 148 b 635 168 616 166 618 170 b 848 -66 752 158 848 60 b 713 -271 848 -157 793 -230 b 690 -262 696 -279 693 -279 z';

const FCLEF_O = 'm 363 377 b 0 56 112 377 0 194 b 177 -158 0 -59 60 -158 b 330 -6 268 -158 330 -95 b 192 144 330 86 262 144 b 120 134 153 144 138 134 b 96 160 101 134 96 145 b 330 323 96 217 183 323 b 549 -53 482 323 549 173 b 14 -871 549 -455 350 -680 b -7 -897 1 -878 -7 -886 b 12 -914 -7 -906 -1 -914 b 36 -907 19 -914 27 -912 b 765 -40 390 -734 765 -478 b 363 377 765 210 612 377 z m 906 259 b 827 180 861 259 827 225 b 906 101 827 135 861 101 b 985 180 950 101 985 135 b 906 259 985 225 950 259 z m 907 -102 b 829 -180 863 -102 829 -135 b 907 -258 829 -225 863 -258 b 985 -180 952 -258 985 -225 b 907 -102 985 -135 952 -102 z';

function renderOutline(outline, scale, xPos, yPos) {
  const parts = outline.split(/\s+/);
  ctx.beginPath();
  let i = 0;
  while (i < parts.length) {
    switch (parts[i++]) {
      case 'm':
        ctx.moveTo(+parts[i++] * scale + xPos, yPos - parts[i++] * scale);
        break;
      case 'b': {
        // VexFlow format: b endX endY cp1X cp1Y cp2X cp2Y
        const ex = +parts[i++] * scale + xPos, ey = yPos - parts[i++] * scale;
        ctx.bezierCurveTo(
          +parts[i++] * scale + xPos, yPos - parts[i++] * scale,
          +parts[i++] * scale + xPos, yPos - parts[i++] * scale,
          ex, ey
        );
        break;
      }
      case 'l':
        ctx.lineTo(+parts[i++] * scale + xPos, yPos - parts[i++] * scale);
        break;
      case 'z':
        ctx.closePath();
        break;
    }
  }
  ctx.fill();
}

// ═══════════════════════════════════════════════════════════
// KEY SIGNATURE ON STAFF
// ═══════════════════════════════════════════════════════════

function drawKeySigOnStaff(clef) {
  if (keySig === 0) return;
  const isTreble = clef === 'treble';
  const positions = keySig > 0
    ? (isTreble ? T_SHARP : B_SHARP)
    : (isTreble ? T_FLAT : B_FLAT);
  const count = Math.abs(keySig);
  const sz = LINE_SP * 1;

  for (let i = 0; i < count; i++) {
    const x = STAFF_LEFT + CLEF_W + i * LINE_SP;
    const y = staffPosToY(positions[i], clef);
    if (keySig > 0) drawSharpSym(x, y, sz, '#ddd');
    else drawFlatSym(x, y, sz, '#ddd');
  }
}

// ═══════════════════════════════════════════════════════════
// TOUCH TRACKING
// ═══════════════════════════════════════════════════════════

const activeTouches = new Map(); // id -> {staffPos, alteration, x, y, startY, sound, side, clef}

function getXY(touch) {
  const r = canvas.getBoundingClientRect();
  return [touch.clientX - r.left, touch.clientY - r.top];
}

function onStart(id, x, y) {
  if (settingsOverlay.classList.contains('open')) { closeSettings(); return; }
  if (activeTouches.size >= 4) return;
  ensureAudio();
  const { sp: rawSp, clef } = yToStaffInfo(y);
  const sp = clef === 'treble'
    ? Math.max(-4, Math.min(rawSp, 17))
    : Math.max(-12, Math.min(rawSp, 4));
  // Left quarter = flat zone, right quarter = sharp zone (immediate, no swipe)
  const zone = x < W * 0.25 ? 'flat' : x > W * 0.75 ? 'sharp' : null;
  const alt = zone === 'sharp' ? 1 : zone === 'flat' ? -1 : 0;
  const midi = staffPosToMidi(sp, alt);
  const sound = new NoteSound(midiToFreq(midi));
  const side = x > W / 2 ? 'left' : 'right';
  activeTouches.set(id, { staffPos: sp, alteration: alt, x, y, startY: y, sound, side, midi, clef, zone });
  draw();
}

function onMove(id, x, y) {
  const t = activeTouches.get(id);
  if (!t) return;
  if (t.zone) return; // no swipe alteration in flat/sharp zones
  // Dragging into alteration zones overrides vertical swipe
  let newAlt = 0;
  if (x > W * 0.75) newAlt = 1;
  else if (x < W * 0.25) newAlt = -1;
  else {
    const dy = t.startY - y; // positive = dragged up
    const threshold = LINE_SP * 1;
    if (dy > threshold) newAlt = 1;
    else if (dy < -threshold) newAlt = -1;
  }
  if (newAlt !== t.alteration) {
    t.alteration = newAlt;
    const midi = staffPosToMidi(t.staffPos, newAlt);
    t.midi = midi;
    t.sound.setFreq(midiToFreq(midi));
    draw();
  }
}

function onEnd(id) {
  const t = activeTouches.get(id);
  if (t) { t.sound.release(); activeTouches.delete(id); draw(); }
}

// Touch events
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) { const [x,y] = getXY(t); onStart(t.identifier, x, y); }
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) { const [x,y] = getXY(t); onMove(t.identifier, x, y); }
}, {passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) onEnd(t.identifier);
}, {passive:false});
canvas.addEventListener('touchcancel', e => {
  e.preventDefault();
  for (const t of e.changedTouches) onEnd(t.identifier);
}, {passive:false});

// Mouse fallback
let mouseIsDown = false;
canvas.addEventListener('mousedown', e => {
  mouseIsDown = true; onStart('mouse', e.offsetX, e.offsetY);
});
canvas.addEventListener('mousemove', e => {
  if (mouseIsDown) onMove('mouse', e.offsetX, e.offsetY);
});
canvas.addEventListener('mouseup', () => { mouseIsDown = false; onEnd('mouse'); });
canvas.addEventListener('mouseleave', () => { if (mouseIsDown) { mouseIsDown = false; onEnd('mouse'); } });

// ═══════════════════════════════════════════════════════════
// MAIN DRAW
// ═══════════════════════════════════════════════════════════

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.lineCap = 'round';

  // ── Alteration zone backgrounds ──
  ctx.fillStyle = '#f5f5f5';
  ctx.fillRect(0, 0, W * 0.25, H);          // flat zone (left)
  ctx.fillRect(W * 0.75, 0, W * 0.25, H);   // sharp zone (right)

  // ── Grey ledger lines (behind clefs and staff lines) ──
  ctx.strokeStyle = '#f5f5f5';
  ctx.lineWidth = staffLW;
  if (staffMode === 'both') {
    const mcY = staffPosToY(0, 'treble');
    ctx.beginPath(); ctx.moveTo(STAFF_LEFT, mcY); ctx.lineTo(STAFF_RIGHT, mcY); ctx.stroke();
  } else if (staffMode === 'treble') {
    for (const sp of [0, -2]) {
      const y = staffPosToY(sp, 'treble');
      ctx.beginPath(); ctx.moveTo(STAFF_LEFT, y); ctx.lineTo(STAFF_RIGHT, y); ctx.stroke();
    }
  } else {
    for (const sp of [0, 2]) {
      const y = staffPosToY(sp, 'bass');
      ctx.beginPath(); ctx.moveTo(STAFF_LEFT, y); ctx.lineTo(STAFF_RIGHT, y); ctx.stroke();
    }
  }

  // ── Clefs (behind lines, grey) ──
  ctx.fillStyle = '#ddd';
  const clefScale = LINE_SP / 250 * 0.7;
  if (staffMode !== 'bass') renderOutline(GCLEF_O, clefScale, STAFF_LEFT, TREBLE_TOP + 3 * LINE_SP);
  if (staffMode !== 'treble') renderOutline(FCLEF_O, clefScale, STAFF_LEFT, BASS_TOP + LINE_SP);

  // ── Staff lines ──
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = staffLW;
  if (staffMode !== 'bass') {
    for (let i = 0; i < 5; i++) {
      const y = TREBLE_TOP + i * LINE_SP;
      ctx.beginPath(); ctx.moveTo(STAFF_LEFT, y); ctx.lineTo(STAFF_RIGHT, y); ctx.stroke();
    }
  }
  if (staffMode !== 'treble') {
    for (let i = 0; i < 5; i++) {
      const y = BASS_TOP + i * LINE_SP;
      ctx.beginPath(); ctx.moveTo(STAFF_LEFT, y); ctx.lineTo(STAFF_RIGHT, y); ctx.stroke();
    }
  }


  // ── Active notes ──
  for (const [, t] of activeTouches) drawNote(t);
}

function drawNote(t) {
  const sp = t.staffPos;
  const clef = t.clef;
  const noteY = staffPosToY(sp, clef);
  const noteX = W / 2;

  const accent = '#d74002';

  // ── Ledger lines for this note ──
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = staffLW;
  const lw = LINE_SP * 1;

  if (clef === 'treble') {
    // Above treble staff (sp > 10)
    if (sp > 10) {
      for (let s = 12; s <= sp; s += 2) {
        const ly = staffPosToY(s, 'treble');
        ctx.beginPath(); ctx.moveTo(noteX - lw, ly); ctx.lineTo(noteX + lw, ly); ctx.stroke();
      }
    }
    // Below treble staff (sp < 2, ledger lines at even positions)
    if (sp < 2) {
      for (let s = 0; s >= sp; s -= 2) {
        const ly = staffPosToY(s, 'treble');
        ctx.beginPath(); ctx.moveTo(noteX - lw, ly); ctx.lineTo(noteX + lw, ly); ctx.stroke();
      }
    }
  } else {
    // Above bass staff (sp > -2, ledger lines at even positions)
    if (sp > -2) {
      for (let s = 0; s <= sp; s += 2) {
        const ly = staffPosToY(s, 'bass');
        ctx.beginPath(); ctx.moveTo(noteX - lw, ly); ctx.lineTo(noteX + lw, ly); ctx.stroke();
      }
    }
    // Below bass staff (sp < -10)
    if (sp < -10) {
      for (let s = -12; s >= sp; s -= 2) {
        const ly = staffPosToY(s, 'bass');
        ctx.beginPath(); ctx.moveTo(noteX - lw, ly); ctx.lineTo(noteX + lw, ly); ctx.stroke();
      }
    }
  }

  // ── Notehead (tilted filled ellipse) ──
  ctx.save();
  ctx.translate(noteX, noteY);
  ctx.rotate(-0.32);
  ctx.beginPath();
  ctx.ellipse(0, 0, LINE_SP * 0.68, LINE_SP * 0.45, 0, 0, Math.PI * 2);
  ctx.fillStyle = accent;
  ctx.fill();
  ctx.restore();

  // ── Accidental (sharp/flat/natural) ──
  if (t.alteration !== 0) {
    const accX = noteX - LINE_SP * 1.7;
    const accSz = LINE_SP * 0.9;
    // Determine what symbol to show:
    // The alteration shifts from key-sig-adjusted pitch.
    // If keySig already has a sharp on this degree, +1 means double sharp (show ♯ or 𝄪),
    // -1 means natural. If keySig has flat, +1 means natural, -1 means double flat.
    // Simple approach: +1 alteration → ♯, -1 → ♭
    // But if key sig already sharps this note and user flattens, it's actually a natural.
    // Let's be smart:
    const deg = ((sp % 7) + 7) % 7;
    const altered = getAlteredDegrees(keySig);
    const ksAdj = altered.has(deg) ? altered.get(deg) : 0;
    const totalAlt = ksAdj + t.alteration;

    if (totalAlt === 0) {
      drawNaturalSym(accX, noteY, accSz, accent);
    } else if (totalAlt > 0) {
      drawSharpSym(accX, noteY, accSz, accent);
    } else {
      drawFlatSym(accX, noteY, accSz, accent);
    }
  }
}

// ═══════════════════════════════════════════════════════════
// KEY SIGNATURE BAR
// ═══════════════════════════════════════════════════════════

const keyBar = document.getElementById('keyBar');
const settingsBtn = document.getElementById('settingsBtn');
const settingsOverlay = document.getElementById('settingsOverlay');
const settingsClose = document.getElementById('settingsClose');
const keyBtns = [];

function keySigLabel(v) {
  if (v === 0) return '♮';
  return Math.abs(v) + (v > 0 ? '♯' : '♭');
}

KEY_SIGS.forEach((ks, idx) => {
  const btn = document.createElement('button');
  btn.className = 'key-btn' + (ks.v === 0 ? ' active' : '');
  btn.textContent = ks.v < 0 ? '♭' : ks.v > 0 ? '♯' : '♮';
  btn.addEventListener('click', () => {
    keySig = ks.v;
    localStorage.setItem('keySig', keySig);
    updateSettings();
    draw();
  });
  btn.addEventListener('touchstart', e => e.stopPropagation(), {passive: true});
  keyBar.appendChild(btn);
  keyBtns.push({btn, ks});
});

document.querySelectorAll('.mode-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    staffMode = opt.dataset.mode;
    localStorage.setItem('staffMode', staffMode);
    document.querySelectorAll('.mode-opt').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    resize(); draw();
  });
  opt.addEventListener('touchstart', e => e.stopPropagation(), {passive: true});
});

function updateSettings() {
  settingsBtn.textContent = keySigLabel(keySig);
  const natIdx = 7;
  keyBtns.forEach(({btn, ks}, idx) => {
    btn.classList.remove('active', 'in-range');
    if (ks.v === keySig) {
      btn.classList.add('active');
    } else if (keySig > 0 && idx > natIdx && idx < natIdx + keySig) {
      btn.classList.add('in-range');
    } else if (keySig < 0 && idx < natIdx && idx > natIdx + keySig) {
      btn.classList.add('in-range');
    }
  });
}

function openSettings() {
  settingsOverlay.classList.add('open');
  settingsBtn.style.display = 'none';
}
function closeSettings() {
  settingsOverlay.classList.remove('open');
  settingsBtn.style.display = '';
}

settingsBtn.addEventListener('click', openSettings);
settingsClose.addEventListener('click', closeSettings);

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════

function init() {
  // Sync UI with persisted settings
  updateSettings();
  document.querySelectorAll('.mode-opt').forEach(o => {
    o.classList.toggle('active', o.dataset.mode === staffMode);
  });
  resize();
  draw();
}

// "Tap to start" overlay — unlocks audio on browsers that require user gesture
const startOverlay = document.getElementById('startOverlay');
function dismissOverlay() {
  ensureAudio();
  startOverlay.remove();
}
startOverlay.addEventListener('touchstart', e => { e.preventDefault(); dismissOverlay(); }, {passive: false});
startOverlay.addEventListener('mousedown', dismissOverlay);

window.addEventListener('resize', () => { resize(); draw(); });
init();
</script>
